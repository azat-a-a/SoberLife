name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  swift-build-and-test:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  ios-xcodebuild:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build iOS app (Simulator)
        run: |
          cd ios
          xcodebuild -project SoberLife.xcodeproj -scheme SoberLife \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            build

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdown lint
        run: bash scripts/lint_markdown.sh
